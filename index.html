<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行政書士 過去問アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .correct { border-color: #3b82f6 !important; background-color: #1e3a8a !important; }
        .wrong { border-color: #ef4444 !important; background-color: #7f1d1d !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans">

    <header class="bg-blue-800 p-4 shadow-lg sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center">行政書士 演習モード</h1>
        <div id="progress-bar" class="w-full bg-gray-700 h-1 mt-2 rounded-full overflow-hidden">
            <div id="progress-inner" class="bg-yellow-400 h-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </header>

    <main class="flex-grow p-4 overflow-y-auto">
        <div id="question-container" class="max-w-2xl mx-auto">
            <div class="flex justify-between text-sm text-gray-400 mb-2">
                <span id="q-category">カテゴリ</span>
                <span id="q-id">ID</span>
            </div>
            <p id="q-text" class="text-lg leading-relaxed mb-6 font-medium"></p>
            
            <div id="options-list" class="space-y-3">
                <!-- 選択肢が動的に生成されます -->
            </div>

            <!-- 解説エリア：初期状態は非表示 -->
            <div id="explanation-area" class="mt-8 p-5 bg-gray-800 rounded-2xl border-l-8 border-blue-500 hidden animate-fade-in">
                <div class="flex items-center mb-3">
                    <span id="result-badge" class="px-3 py-1 rounded-full text-xs font-bold mr-3"></span>
                    <h3 class="font-bold text-blue-400 text-lg">解答・解説</h3>
                </div>
                <p id="explanation-text" class="text-sm leading-relaxed text-gray-200"></p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 p-4 border-t border-gray-700 safe-area-bottom">
        <div class="max-w-2xl mx-auto">
            <button id="next-btn" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-bold hidden transition-transform active:scale-95 text-lg">次の問題へ</button>
            <p id="guide-text" class="text-center text-gray-400 text-sm">選択肢をタップして解答してください</p>
        </div>
    </footer>

    <script>
        const questions = [
            {
                id: "2025-Q1",
                category: "行政法",
                text: "行政手続法における不利益処分に関する記述のうち、正しいものはどれか。",
                options: ["オプション1...", "オプション2...", "オプション3...", "オプション4...", "オプション5..."],
                answer: 1, // 正解インデックス（0=肢1, 1=肢2...）
                explanation: "正解は肢2です。行政手続法第○条により、××の場合は聴聞の手続きを要するとされています。肢1は△△の点で誤りです。"
            },
            // ここに問題データを追加
        ];

        let currentIndex = 0;
        let answered = false;

        function loadQuestion(index) {
            answered = false;
            const q = questions[index];
            document.getElementById('q-category').innerText = q.category;
            document.getElementById('q-id').innerText = q.id;
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('explanation-text').innerText = q.explanation;
            
            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 bg-gray-700 rounded-xl border-2 border-transparent transition-all duration-200 active:scale-[0.98]";
                btn.innerHTML = `<span class="inline-block w-6 h-6 bg-gray-600 text-center rounded-full mr-2 text-xs leading-6">${i+1}</span> ${opt}`;
                btn.onclick = () => checkAnswer(i);
                optionsList.appendChild(btn);
            });

            document.getElementById('explanation-area').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('guide-text').classList.remove('hidden');
            updateProgress();
        }

        function checkAnswer(selectedIndex) {
            if (answered) return;
            answered = true;

            const q = questions[currentIndex];
            const btns = document.getElementsByClassName('option-btn');
            const resultBadge = document.getElementById('result-badge');
            
            // 正誤判定
            if (selectedIndex === q.answer) {
                btns[selectedIndex].classList.add('correct');
                resultBadge.innerText = "正解";
                resultBadge.className = "px-3 py-1 rounded-full text-xs font-bold mr-3 bg-blue-500 text-white";
            } else {
                btns[selectedIndex].classList.add('wrong');
                btns[q.answer].classList.add('correct');
                resultBadge.innerText = "不正解";
                resultBadge.className = "px-3 py-1 rounded-full text-xs font-bold mr-3 bg-red-500 text-white";
            }

            // 解説と次へボタンを表示
            document.getElementById('explanation-area').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('guide-text').classList.add('hidden');
            
            // 解説位置へスムーズにスクロール
            setTimeout(() => {
                document.getElementById('explanation-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function updateProgress() {
            const percent = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progress-inner').style.width = percent + '%';
        }

        document.getElementById('next-btn').onclick = () => {
            currentIndex = (currentIndex + 1) % questions.length;
            loadQuestion(currentIndex);
        };

        loadQuestion(0);
    </script>
</body>
</html>
